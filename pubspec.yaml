name: flipscan_ai
description: FlipScan AI - Intelligent Document Scanner
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^14.0.0

  # Camera
  camera: ^0.10.5+9

  # Image processing (OpenCV wrapper)
  opencv_dart: ^1.0.0

  # PDF Generation (free/open-source)
  pdf: ^3.10.7
  printing: ^5.12.0

  # Local database
  sqflite: ^2.3.2
  shared_preferences: ^2.2.3
  path_provider: ^2.1.2
  path: ^1.9.0

  # State management
  flutter_riverpod: ^2.5.1

  # File operations
  share_plus: ^9.0.0
  permission_handler: ^11.3.1

  # Image utilities
  image: ^4.1.7
  image_picker: ^1.1.2

  # Haptics & sound
  vibration: ^3.0.0
  audioplayers: ^6.0.0

  # UI utilities
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  cached_network_image: ^3.3.1
  uuid: ^4.4.0
  intl: ^0.19.0
  lottie: ^3.1.2
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/sounds/
    - assets/animations/